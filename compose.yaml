services:
  database:
    image: postgres:17-alpine
    container_name: dystopia-postgres

    environment:
      POSTGRES_USER: dogukan
      POSTGRES_PASSWORD: docker123
      POSTGRES_DB: dystopia_travel_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: dystopia-api

    depends_on:
      - database

    ports:
      - "3000:3000"

    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: dogukan
      DB_PASSWORD: docker123
      DB_NAME: dystopia_travel_db

volumes:
  postgres_data:
